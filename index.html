<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Levy Lab Participant Portal</title>
<link rel="stylesheet" href="style.css">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header>
<h1>Levy Lab Participant Portal</h1>
<p>Access your research results and explore our study findings</p>
</header>

<div class="main-container">

<div class="welcome-card">

<h2>Welcome to the Levy Lab</h2>

<p>Please enter your participant ID to view your personal results.</p>

<input type="text" id="participantId" placeholder="Enter your ID">

<br>

<button onclick="goToResults()">View My Results</button>

<!-- Div to display participant data -->
<div id="participantResults" style="margin-top:20px;"></div>

<hr style="margin:30px 0">

<p>You can also explore our overall study findings.</p>

<button onclick="window.location.href='study-results.html'">
View General Study Results
</button>

</div>

</div>

<footer>
<p>© Levy Lab Research Portal</p>
</footer>

<script>
  // Initialize Supabase
  const supabaseUrl = 'https://supabase.com/dashboard/project/qhagmocximrpcnyrchgo/settings/api-keys';  // Replace with your Supabase URL
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoYWdtb2N4aW1ycGNueXJjaGdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTAyNTYsImV4cCI6MjA4OTI2NjI1Nn0.rNfgLWuK2TV-v2xrT_AESFvM4AvwHqss7PUlw28ZRaU';                     // Replace with your anon public key
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function goToResults() {
    const id = document.getElementById("participantId").value.trim();
    if (!id) {
      alert("Please enter your ID");
      return;
    }

    const resultsDiv = document.getElementById('participantResults');

    try {
      const { data, error } = await supabase
        .from('users')       // Your table name in Supabase
        .select('*')
        .eq('id', id)
        .single();

      if (error || !data) {
        resultsDiv.innerHTML = `<p style="color:red;">ID not found. Please check your participant ID.</p>`;
        return;
      }

      // Display participant data
      resultsDiv.innerHTML = `
        <h3>Your Results:</h3>
        <p><strong>Name:</strong> ${data.name}</p>
        <p><strong>Score:</strong> ${data.score}</p>
      `;

    } catch (err) {
      resultsDiv.innerHTML = `<p style="color:red;">An error occurred. Please try again later.</p>`;
      console.error(err);
    }
  }
</script>

</body>
</html>

</body>

</html>
