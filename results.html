<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Your Results</title>
<link rel="stylesheet" href="style.css">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header>
<h1>Your Research Results</h1>
<p>Below are your personalized results from the Levy Lab study.</p>
</header>

<div class="main-container">

<div id="results">
Loading your results...
</div>

</div>

<footer>
<p>© Levy Lab Research Portal</p>
</footer>

<script>
  // -------------------------------
  // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
  // -------------------------------
  const supabaseUrl = 'https://qhagmocximrpcnyrchgo.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoYWdtb2N4aW1ycGNueXJjaGdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTAyNTYsImV4cCI6MjA4OTI2NjI1Nn0.rNfgLWuK2TV-v2xrT_AESFvM4AvwHqss7PUlw28ZRaU';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadResults() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const resultsDiv = document.getElementById("results");

    if (!id) {
      resultsDiv.innerHTML = "<p style='color:red;'>No participant ID provided in URL.</p>";
      return;
    }

    try {
      const { data, error } = await supabase
        .from('users')
        .select('id, name, age, bmi, blood_pressure')
        .eq('id', id)
        .single();

      console.log("Supabase data:", data, "Error:", error);

      if (error || !data) {
        resultsDiv.innerHTML = "<p style='color:red;'>ID not found. Please check your participant ID.</p>";
        return;
      }

      // Display participant data
      resultsDiv.innerHTML = `
        <div class="welcome-card">
          <h2>Hello ${data.name}</h2>
          <p><strong>Age:</strong> ${data.age}</p>
          <p><strong>BMI:</strong> ${data.bmi}</p>
          <p><strong>Blood Pressure:</strong> ${data.blood_pressure}</p>
        </div>
      `;
    } catch (err) {
      resultsDiv.innerHTML = "<p style='color:red;'>An error occurred while loading your results.</p>";
      console.error(err);
    }
  }

  loadResults();
</script>

</body>
</html>
