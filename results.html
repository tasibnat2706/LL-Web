<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Your Results</title>
<link rel="stylesheet" href="style.css">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<header>
<h1>Your Research Results</h1>
<p>Below are your personalized results from the Levy Lab study.</p>
</header>

<div class="main-container">

<div id="results">
Loading your results...
</div>

</div>

<script>
  // -------------------------------
  // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
  // -------------------------------
  const supabaseUrl = 'https://YOUR_PROJECT.supabase.co';  // Supabase Project URL
  const supabaseKey = 'YOUR_ANON_KEY';                     // Supabase anon public key
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadResults() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    console.log("ID from URL:", id);

    const resultsDiv = document.getElementById("results");

    if (!id) {
      resultsDiv.innerHTML = "<p style='color:red;'>No participant ID provided in URL.</p>";
      return;
    }

    try {
      // Fetch participant data from Supabase
      const { data, error } = await supabase
        .from('users')   // Your table name
        .select('*')
        .eq('id', id)
        .single();

      console.log("Supabase data:", data, "Error:", error);

      if (error || !data) {
        resultsDiv.innerHTML = "<p style='color:red;'>ID not found. Please check your participant ID.</p>";
        return;
      }

      // Display participant data
      resultsDiv.innerHTML = `
        <div class="welcome-card">
          <h2>Hello ${data.name}</h2>
          <p><strong>Age:</strong> ${data.age}</p>
          <p><strong>BMI:</strong> ${data.bmi}</p>
          <p><strong>Blood Pressure:</strong> ${data.blood_pressure}</p>
          <p><strong>Cholesterol:</strong> ${data.cholesterol}</p>
          <h3>Interpretation:</h3>
          <p>${data.interpretation}</p>
        </div>
      `;

    } catch (err) {
      resultsDiv.innerHTML = "<p style='color:red;'>An error occurred while loading your results.</p>";
      console.error(err);
    }
  }

  loadResults();
</script>

</body>
</html>
